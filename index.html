<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#173f5f" />
  <meta name="description" content="以閱讀推動班際跑步進度的 3D 校園閱讀平台" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>閱讀跑道 Reading Run</title>
  <link rel="preconnect" href="https://www.gstatic.com" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="./styles.css?v=20260703-2108" />
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <section class="login-card" aria-labelledby="loginTitle">
      <div class="brand-mark" aria-hidden="true">🏃📚</div>
      <p class="eyebrow">READING RUN</p>
      <h1 id="loginTitle">登入閱讀跑道</h1>
      <p class="login-intro">輸入課室及學生 ID。使用同一組資料，可在手機、平板或電腦接續進度。</p>

      <form id="loginForm" class="login-form">
        <label>
          <span>課室</span>
          <select id="loginClass" required></select>
        </label>
        <label>
          <span>學生 ID</span>
          <input id="studentId" type="text" inputmode="text" maxlength="20" autocomplete="username" placeholder="例如：S0123" required />
        </label>
        <button id="loginButton" class="primary-button" type="submit">進入跑道</button>
      </form>

      <div id="loginMessage" class="form-message" role="status"></div>
      <p class="privacy-note">請勿使用學生全名作為 ID。教師可在設定檔修改 17 個課室名稱。</p>
    </section>
  </div>

  <div id="appShell" class="app-shell is-hidden">
    <header class="topbar">
      <div>
        <p class="eyebrow">READING RUN</p>
        <h1 id="schoolTitle">全校閱讀跑道</h1>
      </div>
      <div class="topbar-actions">
        <span id="syncStatus" class="sync-status" data-state="idle">● 等待登入</span>
        <button id="logoutButton" class="ghost-button" type="button">登出</button>
      </div>
    </header>

    <main class="main-layout">
      <aside class="sidebar">
        <section class="student-panel">
          <div class="student-avatar" aria-hidden="true">🏃</div>
          <div>
            <p class="panel-label">目前學生</p>
            <strong id="currentStudentLabel">—</strong>
            <span id="currentClassLabel">—</span>
          </div>
        </section>

        <form id="bookForm" class="book-form">
          <label for="bookTitle">完成閱讀一本書</label>
          <div class="book-input-row">
            <input id="bookTitle" type="text" maxlength="80" placeholder="輸入書名" required />
            <button class="primary-button" type="submit">提交</button>
          </div>
          <p>每提交一本書，你便會在 3D 跑道向前移動。</p>
        </form>

        <section class="my-progress-card">
          <div>
            <span>已閱讀</span>
            <strong id="myBooksCount">0</strong>
            <small>本書</small>
          </div>
          <div>
            <span>跑步距離</span>
            <strong id="myDistance">0</strong>
            <small>米</small>
          </div>
        </section>

        <section class="recent-book-card">
          <span>最近一本</span>
          <strong id="myLastBook">尚未提交</strong>
        </section>
      </aside>

      <section class="content-area">
        <section class="overview-section" aria-labelledby="overviewTitle">
          <div class="section-heading">
            <div>
              <p class="eyebrow">17 CLASSROOMS</p>
              <h2 id="overviewTitle">全校課室狀況</h2>
            </div>
            <p>按課室可查看最多 26 名學生在跑道上的即時位置。</p>
          </div>
          <div id="classroomGrid" class="classroom-grid"></div>
        </section>

        <section class="track-section" aria-labelledby="trackTitle">
          <div class="section-heading track-heading">
            <div>
              <p class="eyebrow">LIVE 3D TRACK</p>
              <h2 id="trackTitle">課室跑道</h2>
            </div>
            <div class="track-stats">
              <span><strong id="trackRunnerCount">0</strong> / 26 人</span>
              <span>最前：<strong id="trackLeader">—</strong></span>
            </div>
          </div>

          <div class="track-shell">
            <div id="trackCanvas" class="track-canvas" aria-label="3D 學生跑道"></div>
            <div id="trackEmpty" class="track-empty">這個課室尚未有學生登入。</div>
          </div>

          <div id="runnerList" class="runner-list" aria-live="polite"></div>
        </section>
      </section>
    </main>
  </div>

  <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>

  <script type="importmap">
    {
      "imports": {
        "./firebase-config.js": "./firebase-config-v3.js"
      }
    }
  </script>
  <script type="module" src="./app.js?v=20260703-2108"></script>
</body>
</html>
