name: Security checks

on:
  push:
    branches:
      - main
      - security/harden-school-500-users
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check JavaScript syntax
        run: |
          node --check app-stage.js
          node --check country-scenes.js
          node --check reading-history.js
          node --check daily-book-recommendation.js
          node --check secure-data-service.js
          node --check secure-password-ui-app.js
          node --check secure-ui-app.js
          node --check secure-track.js
          node --check reading-history-secure.js
          node --check country-scenes-secure.js
          node --check admin-tools/generate-student-users.mjs
          node --check admin-tools/import-users-from-csv.mjs

      - name: Validate Firestore rules with emulator
        run: |
          npx --yes firebase-tools@14 emulators:exec \
            --only firestore \
            --project demo-reading-run \
            "echo Firestore rules loaded"
